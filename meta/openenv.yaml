name: "data-custodian"
version: "1.0.0"
description: >
  An OpenEnv environment where the AI agent acts as a Data Engineer. 
  The agent is dropped into a messy legacy SQLite database and must 
  explore the schema, clean the formatting, extract nested JSON, 
  and normalize the schema to third normal form.
github: "https://github.com/placeholder/data-custodian-env"
entry_point: "env:make_env"
tasks:
  - id: "easy"
    description: "Standardize formatting in the users table."
  - id: "medium"
    description: "Extract JSON fields into separate columns in the orders table."
  - id: "hard"
    description: "Normalize the flat purchases table into relational customers and orders tables."
